version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend-runtime
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod}
      SQLITE_PATH: /app/data/aicompare.db
    volumes:
      - ./backend/data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: nginx-runtime
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
